title: "TiVA Time-Machine — Nowcasting des Chaînes de Valeur Mondiales"
description: "Prédire les flux de valeur ajoutée TiVA des pays du G7 vers 80+ économies mondiales, à partir d'indicateurs macro-économiques disponibles en temps réel."
version: 2
image: logo.png
registration_auto_approve: True
docker_image: codalab/codalab-legacy:py39
enable_detailed_results: True

# Documentation
terms: pages/terms.md
pages:
  - title: "Présentation"
    file: pages/overview.md
  - title: "Données"
    file: pages/data.md
  - title: "Évaluation"
    file: pages/evaluation.md
  - title: "Starting Kit"
    file: pages/starting_kit.md

# Tâches
tasks:
  - index: 0
    name: "Nowcasting TiVA"
    description: "Prédire TiVA_Value_Target à partir des indicateurs macro G7 et pays cibles"
    is_public: true
    input_data: dev_phase/input_data
    reference_data: dev_phase/reference_data
    ingestion_program: ingestion_program
    scoring_program: scoring_program

# Solution de référence
solutions:
  - index: 0
    name: "Baseline Random Forest"
    description: "Random Forest simple — score de référence : 45 097"
    path: solution

# Phases
phases:
  - index: 0
    name: "Phase de développement (2016-2020)"
    description: "Entraînez votre modèle sur 2005-2015 et prédisez les flux TiVA pour 2016-2020."
    start: 1-1-2026
    end: 6-1-2026
    max_submissions_per_day: 5
    max_submissions: 100
    execution_time_limit: 1200
    tasks:
      - 0
    solutions:
      - 0
    starting_kit: solution

# Leaderboard
leaderboards:
  - index: 0
    title: Résultats
    key: Results
    columns:
      - title: "Score Final"
        key: score
        index: 0
        sorting: asc
      - title: "MAE Public (2016-2018)"
        key: mae_public
        index: 1
        sorting: asc
      - title: "MAE Privé (2019-2020)"
        key: mae_private
        index: 2
        sorting: asc
