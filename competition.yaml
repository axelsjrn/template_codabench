---
title: "TiVA Time-Machine — Nowcasting des Chaînes de Valeur Mondiales"
description: >
  Prédire les flux de valeur ajoutée TiVA des pays du G7 vers 80+ économies mondiales,
  à partir d'indicateurs macro-économiques disponibles en temps réel —
  sans attendre les 3 ans de délai de l'OCDE.

image: logo.png
has_registration: false
allow_teams: true
max_submissions_per_day: 5
max_submissions: 100
competition_docker_image: codalab/codalab-legacy:py37

phases:
  1:
    phasenumber: 1
    label: "Phase Publique (2016-2018)"
    description: >
      Entraînez votre modèle sur les années 2005-2015 et prédisez
      les flux TiVA pour 2016-2018 (période stable).
    start_date: "2026-01-01"
    max_submissions: 100
    max_submissions_per_day: 5
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/
    reference_data: dev_phase/reference_data/
    input_data: dev_phase/input_data/

  2:
    phasenumber: 2
    label: "Phase Privée (2019-2020 — COVID + Guerre commerciale)"
    description: >
      Période de rupture structurelle : tensions USA-Chine et COVID-19.
      Pondération x2.33 dans le score final.
    start_date: "2026-02-01"
    max_submissions: 20
    max_submissions_per_day: 2
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/
    reference_data: dev_phase/reference_data/
    input_data: dev_phase/input_data/

leaderboard:
  - label: "Score Final"
    key: score
    rank: 1
    ordering: asc
  - label: "MAE Public (2016-2018)"
    key: mae_public
    ordering: asc
  - label: "MAE Privé (2019-2020)"
    key: mae_private
    ordering: asc

pages:
  - title: "Présentation"
    file: pages/overview.md
  - title: "Données"
    file: pages/data.md
  - title: "Évaluation"
